apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amiyabot-mcp.fullname" . }}
  labels:
    {{- include "amiyabot-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "amiyabot-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "amiyabot-mcp.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "amiyabot-mcp.name" . }}
          image: {{ include "amiyabot-mcp.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.gitSha }}
          env:
            - name: AMIYA_GIT_SHA
              value: {{ .Values.image.gitSha | quote }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /rest/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /rest/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
            - name: resources
              mountPath: /app/resources
      volumes:
        - name: config
          configMap:
            name: {{ include "amiyabot-mcp.fullname" . }}-config
        - name: resources
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "amiyabot-mcp.resourcesClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}