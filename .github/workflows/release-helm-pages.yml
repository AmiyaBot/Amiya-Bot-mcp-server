name: Release Helm Repo

on:
  release:
    types:
      - published

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Ensure gh-pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists"
            exit 0
          fi

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll
          printf "# Helm repository\n" > README.md
          git add .nojekyll README.md
          git commit -m "Initialize gh-pages"
          git push origin gh-pages
          git checkout --force "$GITHUB_SHA"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Align chart metadata with release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          export CHART_VERSION="${RELEASE_TAG#v}"

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          chart_version = os.environ["CHART_VERSION"]

          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?", chart_version):
              raise SystemExit(f"Release tag {release_tag!r} cannot be converted to a valid Helm chart version")

          chart_path = Path("charts/amiyabot-mcp/Chart.yaml")
          chart_text = chart_path.read_text(encoding="utf-8")
          chart_text = re.sub(r"^version: .*?$", f"version: {chart_version}", chart_text, count=1, flags=re.MULTILINE)
          chart_text = re.sub(r'^appVersion: .*?$', f'appVersion: "{release_tag}"', chart_text, count=1, flags=re.MULTILINE)
          chart_path.write_text(chart_text, encoding="utf-8")
          PY

          sed -n '1,20p' charts/amiyabot-mcp/Chart.yaml
          sed -n '20,48p' charts/amiyabot-mcp/templates/_helpers.tpl

      - name: Release charts to GitHub Pages
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          pages_branch: gh-pages
          skip_existing: true
          packages_with_index: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}