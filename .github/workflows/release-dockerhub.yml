name: Release Docker Image

on:
  release:
    types:
      - published

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY || secrets.DOCKERHUB_REPOSITORY }}
      IMAGE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Validate DockerHub settings
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "DOCKERHUB_REPOSITORY is required as either a repository variable or a repository secret, for example: amiyabot/amiyabot-mcp-server"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve Git SHA for release tag
        id: git-meta
        run: |
          echo "git_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ steps.git-meta.outputs.git_sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
