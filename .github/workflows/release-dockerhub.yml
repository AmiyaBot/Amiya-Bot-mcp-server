name: Publish Docker Image And Helm Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v1.2.3
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY || secrets.DOCKERHUB_REPOSITORY }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}
  REPOSITORY_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate DockerHub settings
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "DOCKERHUB_REPOSITORY is required as either a repository variable or a repository secret, for example: amiyabot/amiyabot-mcp-server"
            exit 1
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve Git SHA for release tag
        id: git-meta
        run: |
          echo "git_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ steps.git-meta.outputs.git_sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm-pages:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Ensure gh-pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages already exists"
            exit 0
          fi

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll
          printf "# Helm repository\n" > README.md
          git add .nojekyll README.md
          git commit -m "Initialize gh-pages"
          git push origin gh-pages
          git checkout --force "$GITHUB_SHA"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Align chart metadata with release tag
        run: |
          export CHART_VERSION="${RELEASE_TAG#v}"

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          chart_version = os.environ["CHART_VERSION"]

          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?", chart_version):
              raise SystemExit(f"Release tag {release_tag!r} cannot be converted to a valid Helm chart version")

          chart_path = Path("charts/amiyabot-mcp/Chart.yaml")
          chart_text = chart_path.read_text(encoding="utf-8")
          chart_text = re.sub(r"^version: .*?$", f"version: {chart_version}", chart_text, count=1, flags=re.MULTILINE)
          chart_text = re.sub(r'^appVersion: .*?$', f'appVersion: "{release_tag}"', chart_text, count=1, flags=re.MULTILINE)
          chart_path.write_text(chart_text, encoding="utf-8")
          PY

      - name: Package Helm chart
        run: |
          mkdir -p .chart-dist
          helm package charts/amiyabot-mcp --destination .chart-dist

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: .gh-pages
          fetch-depth: 0

      - name: Publish chart to GitHub Pages
        env:
          PAGES_URL: https://${{ env.REPOSITORY_OWNER }}.github.io/${{ env.REPOSITORY_NAME }}
        run: |
          cp .chart-dist/*.tgz .gh-pages/

          if [ -f .gh-pages/index.yaml ]; then
            helm repo index .gh-pages --url "$PAGES_URL" --merge .gh-pages/index.yaml
          else
            helm repo index .gh-pages --url "$PAGES_URL"
          fi

          touch .gh-pages/.nojekyll
          if [ ! -f .gh-pages/README.md ]; then
            printf "# Helm repository\n" > .gh-pages/README.md
          fi

          cd .gh-pages
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish"
            exit 0
          fi

          git commit -m "Publish Helm chart for ${RELEASE_TAG}"
          git push origin HEAD:gh-pages
